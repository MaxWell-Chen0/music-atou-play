<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NFC Music Experience</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      position: relative;
      color: white;
    }

    .bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1501386761578-eac5c94b800a?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      filter: blur(12px) brightness(0.45);
      transform: scale(1.1);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.75));
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-align: center;
    }

    .cover {
      width: 78vw;
      max-width: 340px;
      aspect-ratio: 1/1;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      animation: float 4s ease-in-out infinite;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .title {
      margin-top: 28px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .artist {
      margin-top: 10px;
      font-size: 17px;
      opacity: 0.72;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      letter-spacing: 3px;
      opacity: 0.6;
    }

    .play-btn {
      margin-top: 36px;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 32px;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .play-btn:active {
      transform: scale(0.94);
    }

    .hint {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      opacity: 0.45;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="content">

    <div class="cover">
      <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop" alt="cover">
    </div>

    <div class="title">寂寞的人伤心的歌</div>
    <div class="artist">NFC MUSIC EXPERIENCE</div>

    <div class="status" id="status">AUTO PLAYING...</div>

    <button class="play-btn" id="playBtn">▶</button>

    <div class="hint">TAP • FEEL • LISTEN</div>

  </div>

  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById('music');
    const btn = document.getElementById('playBtn');
    const statusText = document.getElementById('status');

    async function playMusic() {
      try {
        await music.play();
        btn.innerHTML = '❚❚';
        statusText.innerHTML = 'NOW PLAYING';
      } catch (e) {
        statusText.innerHTML = 'TAP TO START';
      }
    }

    playMusic();

    btn.addEventListener('click', () => {
      if (music.paused) {
        music.play();
        btn.innerHTML = '❚❚';
        statusText.innerHTML = 'NOW PLAYING';
      } else {
        music.pause();
        btn.innerHTML = '▶';
        statusText.innerHTML = 'PAUSED';
      }
    });

    document.body.addEventListener('click', () => {
      if (music.paused) {
        playMusic();
      }
    }, { once: true });
  </script>

</body>
</html>
