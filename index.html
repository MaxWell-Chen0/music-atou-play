<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Music Experience</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:black;
color:white;
position:relative;
}

.background{
position:fixed;
inset:0;
background:url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1600&auto=format&fit=crop') center/cover;
filter:blur(25px) brightness(0.3);
transform:scale(1.15);
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,.7),rgba(0,0,0,.45));
}

.container{
position:relative;
z-index:2;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
padding:5vw;
gap:5vw;
}

.album{
width:38vw;
max-width:340px;
aspect-ratio:1/1;
border-radius:28px;
overflow:hidden;
box-shadow:0 20px 80px rgba(0,0,0,.55);
flex-shrink:0;
animation:float 5s ease-in-out infinite;
}

.album img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}
}

.right{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

.title{
font-size:clamp(28px,4vw,54px);
font-weight:700;
margin-bottom:12px;
text-shadow:0 0 20px rgba(255,255,255,.25);
}

.artist{
font-size:18px;
opacity:.7;
margin-bottom:28px;
}

.lyrics{
font-size:20px;
line-height:2;
color:white;
text-shadow:
0 0 8px rgba(255,255,255,.7),
0 0 18px rgba(255,255,255,.45),
0 0 40px rgba(255,255,255,.25);
opacity:.92;
}

.tip{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 24px;
border-radius:999px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(14px);
font-size:14px;
letter-spacing:2px;
opacity:0;
transition:.35s;
z-index:5;
}

.tip.show{
opacity:1;
}

@media(max-width:900px){
.container{
flex-direction:column;
text-align:center;
padding-top:10vh;
gap:35px;
}

.album{
width:72vw;
max-width:320px;
}

.right{
align-items:center;
}

.lyrics{
font-size:17px;
}
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

<div class="album">
<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop">
</div>

<div class="right">
<div class="title">寂寞的人伤心的歌</div>
<div class="artist">NFC MUSIC EXPERIENCE</div>

<div class="lyrics">
寂寞的人唱着伤心的歌<br>
在凌晨的城市里漂泊<br>
耳机里的旋律慢慢下坠<br>
像情绪沉进黑色夜色
</div>
</div>

</div>

<div class="tip" id="tip">TAP ANYWHERE TO PLAY MUSIC</div>

<audio id="music" autoplay loop playsinline webkit-playsinline>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById('music');
const tip = document.getElementById('tip');

async function autoPlay(){

try{

music.muted = false;
await music.play();

}catch(err){

music.muted = true;

try{
await music.play();
}catch(e){}

music.pause();

setTimeout(()=>{
tip.classList.add('show');
},500);

}
}

autoPlay();

function startMusic(){
music.muted = false;
music.play();
tip.classList.remove('show');
}

document.body.addEventListener('click',startMusic);
</script>

</body>
</html>
